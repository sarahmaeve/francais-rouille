<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ chapter.title }} — {{ chapter.subtitle }}</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>{{ chapter.title }}</h1>
        <p>{{ chapter.subtitle }}</p>
    </header>

    <main>
    {% for section in sections %}
        <h2 style="color: var(--navy); margin: {% if loop.first %}0{% else %}2rem{% endif %} 0 1rem;">{{ section.heading }}</h2>
        <ul class="card-list">
        {% for page in section.pages %}
            <li>
                <a href="{{ page.slug }}.html">
                    <span class="card-title">{{ page.title }}</span>
                    <span class="card-desc">{{ page.description }}</span>
                </a>
            </li>
        {% endfor %}
        </ul>
    {% endfor %}
    </main>

    <footer>
        <a href="../../index.html">{{ chapter.footer_text }}</a> &mdash; {{ chapter.footer_suffix }}
    </footer>
</body>
</html>
