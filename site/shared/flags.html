<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Flags — Français Rouillé</title>
    <link rel="preload" href="fonts/playfair-display-var.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="flags.css">
</head>
<body>
    <header>
        <h1>Feature Flags</h1>
        <p>Toggle experimental content on or off. Changes are saved in your browser.</p>
    </header>

    <main>
        <div id="flag-list"></div>
        <div id="empty-state">
            <p>No flags are currently defined. Add flags to chapter pages using
            <code>flag = "flag-name"</code> in <code>chapter.toml</code>.</p>
        </div>

        <section id="manual-section">
            <h2>Manual flag</h2>
            <p>Enable a flag by name (e.g. from a shared link with <code>?flags=name</code>):</p>
            <div id="add-flag-controls">
                <input type="text" id="flag-input" placeholder="flag-name" autocomplete="off">
                <button id="add-flag-btn" type="button">Enable</button>
            </div>
        </section>
    </main>

    <footer>
        <a href="../index.html">Retour à l'accueil</a>
    </footer>

    <script src="flags.js"></script>
    <script src="flags-ui.js"></script>
</body>
</html>
